openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dhanush Financial Analyzer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: cases
    description: Financial analysis cases
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List all saved cases
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseInput"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get a case by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateCase
      tags: [cases]
      summary: Update a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CaseInput"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    delete:
      operationId: deleteCase
      tags: [cases]
      summary: Delete a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Error:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    WorkingCapitalData:
      type: object
      properties:
        currentAssets:
          type: number
        currentLiabilities:
          type: number
        inventory:
          type: number
        debtors:
          type: number
        creditors:
          type: number
        cash:
          type: number
        sales:
          type: number
        cogs:
          type: number
        purchases:
          type: number
        expenses:
          type: number
        netProfit:
          type: number
    BankingData:
      type: object
      properties:
        openingBalance:
          type: number
        closingBalance:
          type: number
        cashDeposits:
          type: number
        cashWithdrawals:
          type: number
        chequeDeposits:
          type: number
        chequeReturns:
          type: number
        ecsEmiPayments:
          type: number
        loanRepayments:
          type: number
        interestCredits:
          type: number
        interestDebits:
          type: number
        bankCharges:
          type: number
        averageBalance:
          type: number
        minimumBalance:
          type: number
        overdraftUsage:
          type: number
        transactionFrequency:
          type: number
        largeTransactions:
          type: number
        inwardRemittances:
          type: number
        outwardPayments:
          type: number
        salaryCredits:
          type: number
        vendorPayments:
          type: number
        gstTaxPayments:
          type: number
        upiTransactions:
          type: number
        rtgsNeftTransfers:
          type: number
        totalCredits:
          type: number
        totalDebits:
          type: number
    WorkingCapitalResults:
      type: object
      properties:
        currentRatio:
          type: number
        quickRatio:
          type: number
        inventoryTurnover:
          type: number
        debtorDays:
          type: number
        creditorDays:
          type: number
        workingCapitalCycle:
          type: number
        workingCapitalAmount:
          type: number
        eligibilityAmount:
          type: number
    BankingResults:
      type: object
      properties:
        workingCapitalPosition:
          type: string
        liquidityPosition:
          type: string
        cashFlowPosition:
          type: string
        profitabilityLevel:
          type: string
        creditworthiness:
          type: string
        repaymentCapacity:
          type: string
        financialStability:
          type: string
        operationalEfficiency:
          type: string
        businessTurnoverTrend:
          type: string
        cashConversionCycle:
          type: number
        bankingBehavior:
          type: string
        riskLevel:
          type: string
        fundUtilization:
          type: string
        debtServicingAbility:
          type: string
        creditRiskAssessment:
          type: string
        overallScore:
          type: number
    CaseInput:
      type: object
      properties:
        clientName:
          type: string
        caseType:
          type: string
          enum: [working_capital, banking, combined]
        workingCapitalData:
          $ref: "#/components/schemas/WorkingCapitalData"
        bankingData:
          $ref: "#/components/schemas/BankingData"
        workingCapitalResults:
          $ref: "#/components/schemas/WorkingCapitalResults"
        bankingResults:
          $ref: "#/components/schemas/BankingResults"
        notes:
          type: string
      required:
        - clientName
        - caseType
    Case:
      allOf:
        - $ref: "#/components/schemas/CaseInput"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
            updatedAt:
              type: string
          required:
            - id
            - createdAt
            - updatedAt
