packages:
  "recharts": "For rendering financial charts and graphs"
  "framer-motion": "For page transitions and premium micro-interactions"
  "react-hook-form": "For robust manual fallback form handling"
  "@hookform/resolvers": "For form validation with Zod"
  "zod": "For strict schema validation"
  "jspdf": "For generating PDF reports client-side"
  "html2canvas": "For capturing charts and dashboard elements for PDF export"
  "papaparse": "For robust CSV parsing of bank statements"
  "@types/papaparse": "Types for papaparse"

images:
  - path: "artifacts/financial-analyzer/public/images/auth-bg.png"
    description: "Abstract dark mode professional financial background with deep navy and teal geometric glowing elements, subtle data visualization grid lines"
    aspect_ratio: "16:9"
  - path: "artifacts/financial-analyzer/public/images/logo-mark.png"
    description: "Minimalist modern letter D logo for Dhanush Enterprises, sleek teal and gold gradient on transparent background, premium fintech style"
    aspect_ratio: "1:1"

notes:
  - "The API is generated by Orval and exposed via @workspace/api-client-react. We will import the hooks and types directly from there."
  - "Rule-based parsing runs entirely offline via FileReader and Regex before any data is sent to the backend."
  - "Calculations for WC and Banking are computed client-side in real-time."
